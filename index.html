<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Piano Pro - Gestos e Pitch</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --accent: #50e3c2;
            --bg: #1a1a1a;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .header { margin: 10px; text-align: center; }
        
        /* Câmera visível */
        #video-container {
            position: relative;
            width: 320px;
            height: 240px;
            border: 3px solid var(--accent);
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }

        /* Painel de Informações */
        .info-panel {
            display: flex;
            gap: 20px;
            margin: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); }

        /* Controle de Pitch */
        .pitch-control { margin: 10px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { cursor: pointer; width: 150px; }

        /* Teclado Visual em baixo */
        .piano-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            height: 80px;
            background: #111;
        }
        .key {
            flex: 1;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .key.active {
            background-color: var(--accent);
            color: black;
            font-weight: bold;
            transform: translateY(-5px);
        }

        button#startBtn {
            padding: 15px 40px;
            font-size: 18px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(80, 227, 194, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Air Piano Pro</h2>
    </div>

    <div id="video-container">
        <video id="videoElement" autoplay playsinline></video>
    </div>

    <div class="info-panel">
        <div class="stat">
            <span>DEDOS</span>
            <span id="fingerCount" class="stat-val">0</span>
        </div>
        <div class="stat">
            <span>NOTA</span>
            <span id="noteDisplay" class="stat-val">---</span>
        </div>
    </div>

    <div class="pitch-control">
        <span>Grave</span>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        <span>Agudo</span>
    </div>

    <button id="startBtn">INICIAR CÂMERA</button>

    <div class="piano-bar" id="pianoBar">
        <div class="key" data-index="1">Dó</div>
        <div class="key" data-index="2">Ré</div>
        <div class="key" data-index="3">Mi</div>
        <div class="key" data-index="4">Fá</div>
        <div class="key" data-index="5">Sol</div>
        <div class="key" data-index="6">Lá</div>
        <div class="key" data-index="7">Si</div>
        <div class="key" data-index="8">Dó²</div>
        <div class="key" data-index="9">Ré²</div>
        <div class="key" data-index="10">Mi²</div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const fingerCountDisplay = document.getElementById('fingerCount');
        const noteDisplay = document.getElementById('noteDisplay');
        const pitchSlider = document.getElementById('pitchSlider');
        const startBtn = document.getElementById('startBtn');
        const keys = document.querySelectorAll('.key');

        let audioCtx;
        let currentOscillator = null;
        let lastFingerCount = -1;

        // Mapeamento: 1 dedo = Dó, etc.
        const noteMap = {
            1: { name: "Dó", freq: 261.63 },
            2: { name: "Ré", freq: 293.66 },
            3: { name: "Mi", freq: 329.63 },
            4: { name: "Fá", freq: 349.23 },
            5: { name: "Sol", freq: 392.00 },
            6: { name: "Lá", freq: 440.00 },
            7: { name: "Si", freq: 493.88 },
            8: { name: "Dó²", freq: 523.25 },
            9: { name: "Ré²", freq: 587.33 },
            10: { name: "Mi²", freq: 659.25 }
        };

        function updateUI(count) {
            fingerCountDisplay.innerText = count;
            keys.forEach(k => k.classList.remove('active'));
            
            if (count > 0 && noteMap[count]) {
                noteDisplay.innerText = noteMap[count].name;
                const activeKey = document.querySelector(`.key[data-index="${count}"]`);
                if (activeKey) activeKey.classList.add('active');
            } else {
                noteDisplay.innerText = "---";
            }
        }

        function playSound(fingers) {
            if (!audioCtx || fingers === lastFingerCount) return;
            lastFingerCount = fingers;

            if (currentOscillator) {
                currentOscillator.stop();
                currentOscillator.disconnect();
                currentOscillator = null;
            }

            // 0 dedos = Silêncio
            if (fingers === 0 || !noteMap[fingers]) {
                updateUI(0);
                return;
            }

            updateUI(fingers);

            const pitchFactor = parseFloat(pitchSlider.value);
            currentOscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            currentOscillator.type = 'triangle'; // Som um pouco mais encorpado
            currentOscillator.frequency.value = noteMap[fingers].freq * pitchFactor;

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);

            currentOscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            currentOscillator.start();
            currentOscillator.stop(audioCtx.currentTime + 0.8);
        }

        function countFingers(landmarks) {
            let count = 0;
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];

            for (let i = 0; i < tips.length; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y) count++;
            }
            // Dedão (ajustado para detecção lateral básica)
            if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.05) {
                if (landmarks[4].y < landmarks[3].y) count++;
            }
            return count;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            let total = 0;
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    total += countFingers(landmarks);
                }
            }
            playSound(Math.min(total, 10));
        });

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBtn.style.display = 'none';
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 320, height: 240
            });
            camera.start();
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Piano Pro com Sustentação</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --accent: #50e3c2;
            --bg: #1a1a1a;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .header { margin: 10px; text-align: center; }
        
        #video-container {
            position: relative;
            width: 320px;
            height: 240px;
            border: 3px solid var(--accent);
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }

        .info-panel {
            display: flex;
            gap: 20px;
            margin: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); }

        .pitch-control { margin: 10px; display: flex; align-items: center; gap: 10px; }
        input[type=range] { cursor: pointer; width: 150px; }

        .piano-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            height: 80px;
            background: #111;
        }
        .key {
            flex: 1;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #888;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .key.active {
            background-color: var(--accent);
            color: black;
            font-weight: bold;
            transform: translateY(-5px);
        }

        button#startBtn {
            padding: 15px 40px;
            font-size: 18px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(80, 227, 194, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Air Piano Pro</h2>
    </div>

    <div id="video-container">
        <video id="videoElement" autoplay playsinline></video>
    </div>

    <div class="info-panel">
        <div class="stat">
            <span>DEDOS</span>
            <span id="fingerCount" class="stat-val">0</span>
        </div>
        <div class="stat">
            <span>NOTA</span>
            <span id="noteDisplay" class="stat-val">---</span>
        </div>
    </div>

    <div class="pitch-control">
        <span>Grave</span>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        <span>Agudo</span>
    </div>

    <button id="startBtn">INICIAR CÂMERA</button>

    <div class="piano-bar" id="pianoBar">
        <div class="key" data-index="1">Dó</div>
        <div class="key" data-index="2">Ré</div>
        <div class="key" data-index="3">Mi</div>
        <div class="key" data-index="4">Fá</div>
        <div class="key" data-index="5">Sol</div>
        <div class="key" data-index="6">Lá</div>
        <div class="key" data-index="7">Si</div>
        <div class="key" data-index="8">Dó²</div>
        <div class="key" data-index="9">Ré²</div>
        <div class="key" data-index="10">Mi²</div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const fingerCountDisplay = document.getElementById('fingerCount');
        const noteDisplay = document.getElementById('noteDisplay');
        const pitchSlider = document.getElementById('pitchSlider');
        const startBtn = document.getElementById('startBtn');
        const keys = document.querySelectorAll('.key');

        let audioCtx;
        let currentOscillator = null;
        let currentGain = null;
        let lastFingerCount = -1;
        let lastHandZ = null;

        const noteMap = {
            1: { name: "Dó", freq: 261.63 },
            2: { name: "Ré", freq: 293.66 },
            3: { name: "Mi", freq: 329.63 },
            4: { name: "Fá", freq: 349.23 },
            5: { name: "Sol", freq: 392.00 },
            6: { name: "Lá", freq: 440.00 },
            7: { name: "Si", freq: 493.88 },
            8: { name: "Dó²", freq: 523.25 },
            9: { name: "Ré²", freq: 587.33 },
            10: { name: "Mi²", freq: 659.25 }
        };

        function updateUI(count) {
            fingerCountDisplay.innerText = count;
            keys.forEach(k => k.classList.remove('active'));
            
            if (count > 0 && noteMap[count]) {
                noteDisplay.innerText = noteMap[count].name;
                const activeKey = document.querySelector(`.key[data-index="${count}"]`);
                if (activeKey) activeKey.classList.add('active');
            } else {
                noteDisplay.innerText = "---";
            }
        }

        function playSound(fingers, landmarks) {
            if (!audioCtx) return;

            let isSlap = false;

            // Verifica o movimento no eixo Z (aproximação e afastamento para "tapa")
            if (landmarks && landmarks.length > 0) {
                const currentZ = landmarks[0].z; // Posição Z do pulso ou base da mão
                if (lastHandZ !== null && Math.abs(currentZ - lastHandZ) > 0.08) {
                    isSlap = true;
                }
                lastHandZ = currentZ;
            }

            // Se for o mesmo número de dedos e não for o movimento de tapa, ignora
            if (fingers === lastFingerCount && !isSlap) return;

            // Tratamento para 0 dedos (Silêncio com fade-out)
            if (fingers === 0) {
                lastFingerCount = 0;
                updateUI(0);
                if (currentGain) {
                    currentGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6); // Fade-out suave
                    setTimeout(() => {
                        if (currentOscillator) {
                            currentOscillator.stop();
                            currentOscillator.disconnect();
                            currentOscillator = null;
                            currentGain = null;
                        }
                    }, 600);
                }
                return;
            }

            if (!noteMap[fingers]) return;

            // Se uma nota já está tocando, faz a transição (fade rápido para não dar estalos)
            if (currentOscillator) {
                if (currentGain) {
                    currentGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                }
                let oldOsc = currentOscillator;
                setTimeout(() => {
                    oldOsc.stop();
                    oldOsc.disconnect();
                }, 150);
            }

            lastFingerCount = fingers;
            updateUI(fingers);

            const pitchFactor = parseFloat(pitchSlider.value);
            
            currentOscillator = audioCtx.createOscillator();
            currentGain = audioCtx.createGain();

            currentOscillator.type = 'triangle'; 
            currentOscillator.frequency.value = noteMap[fingers].freq * pitchFactor;

            currentGain.gain.setValueAtTime(0, audioCtx.currentTime);
            currentGain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + 0.08); // Fade-in para soar natural

            currentOscillator.connect(currentGain);
            currentGain.connect(audioCtx.destination);

            currentOscillator.start();
        }

        function countFingers(landmarks) {
            let count = 0;
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];

            for (let i = 0; i < tips.length; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y) count++;
            }
            
            if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.05) {
                if (landmarks[4].y < landmarks[3].y) count++;
            }
            return count;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            let total = 0;
            let firstHand = null;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                firstHand = results.multiHandLandmarks[0];
                for (const landmarks of results.multiHandLandmarks) {
                    total += countFingers(landmarks);
                }
                total = Math.min(total, 10);
                playSound(total, firstHand);
            } else {
                playSound(0, null);
            }
        });

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBtn.style.display = 'none';
            const camera = new Camera(videoElement, {
                onFrameRate: 30,
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 320, height: 240
            });
            camera.start();
        });
    </script>
</body>
            </html>
